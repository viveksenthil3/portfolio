<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0G45VLEQ3J"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-0G45VLEQ3J');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #667eea;
            margin-top: 0;
        }
        p {
            color: #666;
            margin: 15px 0;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .links a:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting...</h1>
        <p id="message"><span class="loading"></span>Please wait while we redirect you.</p>
        <div id="error" class="error" style="display: none;"></div>
        <div id="links" class="links" style="display: none;"></div>
    </div>

    <script>
        // Redirection mapping
        const redirects = {
            linkedin: 'https://www.linkedin.com/in/vivek-senthil-150101174/',
            github: 'https://github.com/yourusername',
            twitter: 'https://twitter.com/yourhandle',
            portfolio: 'https://yoursite.com',
            email: 'mailto:your.email@example.com',
            // Add more routes as needed
        };

        function handleRedirect() {
            const params = new URLSearchParams(window.location.search);
            const redirectTo = params.get('to');

            if (redirectTo && redirects[redirectTo.toLowerCase()]) {
                // Redirect to the mapped URL
                window.location.href = redirects[redirectTo.toLowerCase()];
            } else if (redirectTo) {
                // Invalid redirect route
                showError(`Invalid redirect route: "${redirectTo}"`);
                showAvailableLinks();
            } else {
                // No redirect specified
                showError('No redirect route specified');
                showAvailableLinks();
            }
        }

        function showError(message) {
            document.getElementById('message').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        function showAvailableLinks() {
            const linksDiv = document.getElementById('links');
            linksDiv.innerHTML = '<p><strong>Available routes:</strong></p>';
            
            for (const [key, url] of Object.entries(redirects)) {
                const link = document.createElement('a');
                link.href = `?to=${key}`;
                link.textContent = key.charAt(0).toUpperCase() + key.slice(1);
                linksDiv.appendChild(link);
            }
            
            linksDiv.style.display = 'block';
        }

        // Handle redirect on page load
        handleRedirect();
    </script>
</body>
</html>
